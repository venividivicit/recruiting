services:
  db:
    image: postgres:16-alpine
    container_name: recruiting-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: recruiting
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d recruiting']
      interval: 3s
      timeout: 5s
      retries: 10

  backend:
    container_name: recruiting-backend
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - '8000:8000'
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/recruiting
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
      exec uvicorn src.main:app --host 0.0.0.0 --port 8000"

  frontend:
    container_name: recruiting-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '3030:3030'
    volumes:
      - ./frontend:/web
      - /web/node_modules/

volumes:
  postgres_data:
